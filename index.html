<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Media Database</title>
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --bg-color: #f4f4f9;
            --card-bg: white;
            --text-color: #333;
            --header-bg: white;
            --header-border: #ddd;
            --progress-bg: #eee;
            --shadow: rgba(0,0,0,0.08);
            --summary-hover: #f0f0f0;
            --input-bg: white;
            --input-text: black;
        }

        /* 2. Define Dark Mode Overrides */
        .dark-mode {
            --bg-color: #121212;
            --card-bg: #292929;
            --text-color: #e0e0e0;
            --header-bg: #181818;
            --header-border: #333;
            --progress-bg: #333;
            --shadow: rgba(0,0,0,0.6);
            --summary-hover: #252525;
            --input-bg: #2a2a2a;
            --input-text: white;
        }
        body {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px 2%;
        }
        .grid { /* TODO: if there are few enough cards, this does only two columns. If there is enough room, it should always do the maximum number of columns before it does more rows.  In fact, the whole grid and summary area should always expand as much as it can before it hits the limits */
            display: grid;
            /* grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            gap: 6px;
            justify-content: space-between;
        }
        .card-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .card:hover {
            transform: translateY(-5px); /* Lift effect on hover */
            box-shadow: 0 6px 20px var(--shadow);
        }
        .title {
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            flex: 1;
        }
        .title:hover { text-decoration: underline; }
        .status { font-size: 0.9em; color: white; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 10px; background-color: #555; }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            color: var(--text-color);
            padding: 15px 20px;
            border-bottom: 2px solid var(--header-border);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px var(--shadow);
            border-radius: 6px;
            align-items: center;
        }
        .sticky-header h1 { margin: 0; font-size: 1.5em; text-shadow: 3px 3px 5px var(--shadow);}
        select {
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--header-border);
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow);
        }
        input {
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--header-border);
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow);
        }
        /* Chrome, Safari, Edge, Opera */
        /* TODO: Only remove for score input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
            width: 6ch;
        }

        .btn {
            display: block;
            padding: 8px 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--shadow);
            text-align: center;
        }
        .btn:hover {
            background: #2e93ff;
            transform: translateY(-1px);
            box-shadow: 0 3px 20px var(--shadow);
        }
        .btn:active {
            background: #0056b3;
            box-shadow: none;
            transform: translateY(1px);
        }
        .history-btn {
            display: inline-block;
            height: fit-content;
            padding: 8px 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--shadow);
            text-align: center;
        }
        .history-btn:hover {
            background: #2e93ff;
            transform: translateY(-1px);
            box-shadow: 0 3px 20px var(--shadow);
        }
        .history-btn:active {
            background: #0056b3;
            box-shadow: none;
            transform: translateY(1px);
        }

        .status-COMPLETED { background-color: #28a745; }
        .status-WATCHING, .status-CURRENT { background-color: #007bff; }
        .status-PLANNING { background-color: #6c757d; }
        .status-DROPPED { background-color: #dc3545; }
        .status-PAUSED { background-color: #ffc107; color: #333 !important; }
        .progress-container {
            background: var(--progress-bg);
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin: 15px 0;
            overflow: hidden;
            flex: 1;
            box-shadow: 0 1px 3px var(--shadow);
        }
        .progress-bar {
            background: #007bff;
            height: 100%;
            transition: width 0.3s ease;
        }
        details {
            margin-top: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        summary {
            margin-bottom: 10px;
            font-size: 1.6em;
            font-weight: bold;
            cursor: pointer;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--shadow);
            position: sticky;
            top: 100px;
            
            /* Add Flexbox directly to the summary */
            display: flex;
            align-items: center;
            list-style: none; /* Hides the default arrow in most browsers */
        }
        
        summary::-webkit-details-marker { display: none; } /* Hides arrow in Safari/Chrome */
        summary:hover { background-color: var(--summary-hover); }

        /* Custom arrow */
        summary::before {
            content: '▶';
            font-size: 0.7em;
            margin-right: 15px;
            transition: transform 0.2s ease;
            color: var(--text-color);
        }

        /* Rotate the custom arrow downwards when the dropdown is open */
        details[open] summary::before {
            transform: rotate(90deg);
        }

        .controls-container {
            height: calc(100vh - 150px); 
            position: sticky;
            top: 100px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 12px var(--shadow);
            width: max-content;
            min-width: fit-content;
            max-width: 30%;
            flex: 0 0 auto; /* ADDED: Prevents it from growing/shrinking improperly */
            background-color: var(--card-bg);
            gap: 15px;
            overflow-y: auto; 
            scrollbar-width: thin;
        }

        .media-container {
            flex: 1;
            min-width: 0; 
        }

        .theme-toggle {
            margin-left: auto;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--header-border);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 0.8em;
            box-shadow: 0 2px 5px var(--shadow);
        }

        .no-scroll {
            overflow: hidden;
            height: 100%;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4); /* Black w/ opacity */

            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--header-bg);
            padding: 20px;
            width: 80%;
            max-width: 1400px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px var(--shadow);
            gap: 10px;
            justify-content: space-between;
            max-height: 80vh;
            overflow: hidden;
        }

        .details-container {
            display: flex;
            flex-direction: row;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .main-details-container {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 8px;
            padding: 15px;
            flex: 2 1 0; 
            min-width: 500px;   /* It should still be able to shrink past this, but it should force the list section to wrap underneath it first. */
            box-shadow: 0 2px 5px var(--shadow);
            width: min-content;
            gap: 10px;
            /* justify-content: space-between; */
            background-color: var(--card-bg);
            /* max-height: 90%; */
            min-height: 0;
            overflow: hidden;
        }

        .small-details-container {
            display: flex;
            flex-direction: row;
            gap: 15px;
            flex: 0 0 auto;
            justify-content: space-between;
            align-items: center;
        }

        .history-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid black;
            border-radius: 8px;
            padding: 13px;
            flex: 1;
            box-shadow: inset 0 0 5px var(--shadow);
            background-color: var(--header-bg);
            overflow-y: auto;
            scrollbar-width: thin;
            min-height: 0;
        }
        .history-card {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 8px;
            padding: 10px;
            gap: 10px;
            background-color: var(--card-bg);
            box-shadow: 0 0 5px var(--shadow);
        }

        .lists-section-container {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 8px;
            padding: 15px;
            flex: 0 0 auto;
            width: max-content;
            box-shadow: 0 2px 5px var(--shadow);
            background-color: var(--card-bg);
            overflow-y: auto;
            scrollbar-width: thin;
        }

        div[contenteditable="true"] {
            border: 1px solid black;
            border-radius: 8px;
            padding: 10px;
            /* flex: 1; */
            box-shadow: inset 0 2px 5px var(--shadow);
            white-space: pre-wrap;
            background-color: var(--header-bg);
        }
        div[contenteditable="true"]:empty::before {
            content: attr(data-placeholder);
            color: #888;
            pointer-events: none; /* Prevents the placeholder from interfering with text cursor clicks */
        }

        .detail-container {
            display: flex;
            flex-direction: column;
            padding: 10px;
            width: fit-content;
        }

        .details-section-heading {
            margin-top: 0;
            padding-left: 5px;
            margin-bottom: 1px;
        }

        @media (max-width: 980px) {
            .modal-content {
                overflow: auto;
            }
            
            .details-container {
                flex-direction: column; /* Stack the cards vertically */
                overflow-y: auto;       /* Allow the whole modal body to scroll if needed */
            }

            .main-details-container {
                min-width: 0;           /* Release the 500px lock so it shrinks on thin screens */
                width: 100%;
                flex: 0 0 auto;
                /*height: 60vh;           /* Re-establish a strict height so inner scrolling survives the stack */
            }

            .lists-section-container {
                min-width: 0;           /* Release the 400px lock */
                width: 100%;
                flex: 0 0 auto;
                /*height: 40vh;           /* Give the lists card a defined height so it doesn't collapse */
            }
        }


        /* Styling for the list items in the sidebar */
        .single-select-item {
            display: block;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .single-select-item:hover {
            background-color: var(--summary-hover);
            border: 1px solid var(--header-border);
        }

        /* The active/selected list style */
        .single-select-item.active {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 5px var(--shadow);
        }


        .multi-select-item {
            display: block;
            position: relative;
            padding-left: 20px;
            margin-top: 0px;
            cursor: pointer;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .multi-select-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }
        .checkmark {
            position: absolute;
            top: 50%;
            transform: translateY(-50%); /* Perfectly centers it vertically */
            left: 0;
            height: 14px; /* Increased from 10px for better proportions */
            width: 14px;
            background-color: #eee;
            border-radius: 2px; /* Optional: slightly rounds the corners */
        }
        .multi-select-item:hover input ~ .checkmark {
            background-color: #ccc;
        }
        .multi-select-item input:checked ~ .checkmark {
            background-color: #2196F3;
        }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            /* Adjusted positioning for the 14x14 box */
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .multi-select-item input:checked ~ .checkmark:after {
            display: block;
        }

        .new-list-btn {
            display: block;
            padding: 4px 18px;
            background: none;
            color: grey;
            border: 1px solid grey;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }


        .stat-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            gap: 6px;
            justify-content: space-between;
            width: 100%;
            max-height: 400px;
        }
        .stat-card-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .stat-title {
            text-align: center;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div style="max-width: 1440px; width: 100%;">
        <!-- <h1>My Media Library</h1> --> <!-- I did kinda like having this be separate from the bar, but having it be on the bar makes sense for now until the bar maybe fills up more. Or maybe have it be above the bar when we're scrolled to the top of the page, but fall down into the bar when you scroll down?-->
        <div class="sticky-header" style="flex-direction: column; align-items: stretch; padding: 10px 20px;">
    
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--header-border); padding-bottom: 10px; margin-bottom: 10px;">
                <h1 style="margin: 0; font-size: 1.8em; text-shadow: 2px 2px 4px var(--shadow);">Media Library</h1>
                
                <!-- TODO: Make these look more like tabs -->
                <div style="display: flex; gap: 15px;">
                    <button class="btn" style="background: #333;" onclick="switchPage('library')">Library</button>
                    <button class="btn" style="background: transparent; color: var(--text-color); border: 1px solid var(--header-border);" onclick="switchPage('stats')">Stats</button>
                </div>

                <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-btn">⏾ Mode</button>
            </div>

            <div id="library-toolbar" style="display: flex; align-items: center; gap: 15px;">
                <h3 style="margin: 0;">0 Entries</h3>
                <search style="margin: 0;">
                    <form style="margin: 0;">
                        <input class="search-bar" name="fsrch" id="fsrch" placeholder="🔍︎" style="border-radius: 15px;">
                    </form>
                </search>
                <label>Sort:
                    <select id="sort-order" onchange="renderMedia()">
                        <option value="name">Name</option>
                        <option value="score">Score</option>
                        <option value="watch_date">Recently Watched</option>
                    </select>
                </label>
                <button class="btn" onclick="addNew('PLANNING')" style="margin: 0;">New</button>
            </div>
        </div>

        <div>
            <div style="display: flex; flex-direction: row; gap: 25px;">
                <div class="controls-container">
                    <div>
                        <h3 class="details-section-heading">Media Type</h3>
                        <div class="card-list" id="media-type-selector" style="gap: 1px;">
                        </div>
                    </div>

                    <div>
                        <h3 class="details-section-heading">Lists</h3>
                        <div class="card-list" id="list-selector" style="gap: 1px;"></div>
                    </div>
                </div>

                <div id="library-view">
                    <div class="media-container" id="media-container" class="block" style="width: 100%;">
                        <h2>Loading media...</h2>
                    </div>
                </div>

                <div id="stats-view" style="display: none; padding: 20px; width: 100%">
                    <h2 style="grid-column: span 2;">Your Stats</h2>
                    
                    <div class="stat-card">
                        <h3 class="stat-title">Score Distribution</h3> 
                        <label>Bins: 
                            <input type="number" id="histo-bins" value="10" min="2" max="20" style="width: 60px;" onchange="fetchStats()">
                        </label>
                        <div style="flex:1;"><canvas id="scoreHistoChart"></canvas></div>
                    </div>

                    <div class="stat-card">
                        <h3 class="stat-title">Status Distribution</h3> 
                        <div style="flex:1;"><canvas id="statusDistChart"></canvas></div>
                    </div>

                    <div class="stat-card">
                        <h3 class="stat-title">Media Type Distribution</h3> 
                        <div style="flex:1;"><canvas id="mediaTypeDistChart"></canvas></div>
                    </div>

                    <div class="stat-card">
                        <h3 class="stat-title">List Distribution</h3> 
                        <div style="flex:1;"><canvas id="listDistChart"></canvas></div>
                    </div>

                    <div class="stat-card" style="grid-column: span 2;">
                        <h3 class="stat-title">Watch History (Completions)</h3> 
                        <div style="height: 300px;"><canvas id="watchHistoryChart"></canvas></div>
                    </div>

                    <div class="stat-card">
                        <h3 class="stat-title">Completion Speed Distribution</h3> 
                        <label>Bins: 
                            <input type="number" id="speed-histo-bins" value="10" min="2" max="20" style="width: 60px;" onchange="fetchStats()">
                        </label>
                        <div style="flex:1;"><canvas id="speedHistoChart"></canvas></div>
                    </div>
                </div>
            </div>

            
            <div id="details-modal" class="modal">
                <div class="modal-content">
                    <div>
                        <h1 style="margin-bottom: 0; text-shadow: 3px 3px 5px var(--shadow);"></h1>
                        <hr style="width:100%;">
                    </div>
                    <div class="details-container">
                        <div class="main-details-container">
                            <div class="small-details-container" id="small-details-container">
                                <div id="left-details" style="display: flex; flex-direction: row;">
                                    <!-- TODO: get rid of this because we have the action buttons now? -->
                                    <!-- <div class="detail-container">
                                        <label><strong>Status</strong>
                                            <select id="status-detail" onchange="changeStatus(currentOpenMediaId, this.value)"> 
                                                <option value="PLANNING">PLANNING</option>
                                                <option value="CURRENT">CURRENT</option>
                                                <option value="REPEATING">REPEATING</option>
                                                <option value="PAUSED">PAUSED</option>
                                                <option value="DROPPED">DROPPED</option>
                                                <option value="COMPLETED">COMPLETED</option>
                                            </select>
                                        </label>
                                    </div> -->
                                    <div class="detail-container">
                                        <label><strong>Score</strong>
                                            <input type="number" id="score-detail" onChange="editingItem.score = this.value * 100"></input>
                                        </label>
                                    </div>
                                    <div class="detail-container">
                                        <label><strong>Progress</strong>
                                            <input type="number" id="progress-detail" onchange="editingItem.watch_history.at(-1).progress = this.value"></input>
                                        </label>
                                    </div>
                                </div>

                                <div id="right-actions" style="display: flex; flex-direction: row; gap: 10px; align-items: center; padding-right: 15px;">
                                    <button class="history-btn" id="start-btn">Start</button>
                                    <button class="history-btn" id="finish-btn" onclick="changeStatus(currentOpenMediaId, 'finish')">Finish</button>
                                    <button class="history-btn" id="revive-btn">Revive</button>
                                    <button class="history-btn" id="pause-btn">Pause</button>
                                    <button class="history-btn" id="continue-btn">Continue</button>
                                    <button class="history-btn" id="drop-btn" onclick="changeStatus(currentOpenMediaId, 'drop')">Drop</button>
                                </div>
                            </div>

                            <div class="history-wrapper">
                                <h2 class="details-section-heading" id="history-section-title">History</h2>
                                <div class="card-list" id="watch-history-container"></div>
                            </div>
                        </div>

                        <div class="lists-section-container">
                            <h3 class="details-section-heading">Lists</h3>
                            <div class="card-list" id="modal-list-container"></div>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: row; width: 100%;">
                        <span class="btn" onclick="deleteMedia()" style="width: fit-content; background-color: red;"><strong>Delete</strong></span> <!-- TODO: Kind of an agressive red -->
                        <span class="btn" onclick="closeDetails(true)" style="width: fit-content; margin-left: auto;"><strong>Save</strong></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";    // TODO: Probably shouldn't be hard-coded
        const allMedia = {};
        let mediaLists = {};
        const modal = document.getElementById("details-modal");
        var selectedList = 'All';
        var selectedMediaType = 'All';
        const mediaFormats = ['Anime', 'Anime Movie', 'AMV', 'Manga', 'Light Novel', 'Live-Action Movie', 'Show', 'Webtoon', 'Book'];
        let currentOpenMediaId = null;
        let editingItem = null;
        let charts = {}; // To store chart instances for cleanup

        const chartOptions = {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, ticks: { precision: 0 } }
            }
        };

        const pieOptions = {
            ...chartOptions,
            plugins: { legend: { display: true, position: 'right' } },
            cutout: '60%'
        }; // TODO: Get rid of x and y axis

        const statusColors = {
            'COMPLETED': '#28a745',
            'CURRENT': '#007bff',
            'PLANNING': '#6c757d',
            'DROPPED': '#dc3545',
            'PAUSED': '#ffc107',
            'REPEATING': '#17a2b8'
        };

        const startBtn = document.getElementById('start-btn');
        const finishBtn = document.getElementById('finish-btn');
        const reviveBtn = document.getElementById('revive-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const continueBtn = document.getElementById('continue-btn');
        const dropBtn = document.getElementById('drop-btn');
        const historyBtns = [startBtn, finishBtn, reviveBtn, pauseBtn, continueBtn, dropBtn];

        const newListBtnHTML = `<button class="new-list-btn" onclick="newList()">New</button>`; // TODO: Add hover effect? Maybe filling the button in and inverting the text?

        /*
         * HELPER FUNCTIONS:
         */

        window.onclick = function(event) {
            if (event.target == modal) closeDetails(false);
        } 

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.style.display === "block") closeDetails(false);
        });

        function addSingleSelectOption(name, list) {
            let listOption = document.createElement('div');
            // Check if this is the currently selected list to apply the 'active' class
            const isActive = (selectedList === name) ? 'active' : '';
            
            listOption.innerHTML = `
                <div class="single-select-item ${isActive}" onclick="selectList('${name}')">
                    ${name}
                </div>
            `;
            list.appendChild(listOption);
        }

        function selectList(name) {
            selectedList = name;
            renderMedia();
            // If stats are visible, refresh them too
            if (document.getElementById('stats-view').style.display !== 'none') {
                fetchStats();
            }
        }

        function getMediaFormat(mediaType) {
            if (["Anime", "Anime Movie", "AMV", "Live-Action Movie", "Live-Action Show"].includes(mediaType)) {
                return "watch";
            } else if (["Manga", "Light Novel", "Webtoon", "Book"].includes(mediaType)) {
                return "read";
            }
        }

        function formatDate(dateString) {
            if (dateString) {
                return new Date(dateString).toISOString().split('T')[0];
            } else {
                return new Date().toISOString().split('T')[0];
            }
        }

        function getFormattedStatus(item, mediaFormat) {
            var itemStatus = item.status;
            if (mediaFormat == "watch") {
                switch (item.status) {
                    case "CURRENT": { itemStatus = "WATCHING"; break; }
                    case "REPEATING": { itemStatus = "RE-WATCHING"; break; }
                }
            } else if (mediaFormat == "read") {
                switch (item.status) {
                    case "CURRENT": { itemStatus = "READING"; break; }
                    case "REPEATING": { itemStatus = "RE-READING"; break; }
                }
            } else {
                itemStatus = "ERROR: MEDIA TYPE NOT RECOGNIZED";
            }
            return itemStatus;
        }

        function formatItem(rawItem) {
            rawItem["media_format"] = getMediaFormat(rawItem.media_type);
            rawItem["formatted_status"] = getFormattedStatus(rawItem, rawItem.media_format);    // TODO: Should maybe do this lazily?
            rawItem.watch_history.forEach(history => {
                history["formatted_status"] = getFormattedStatus(history, rawItem.media_format);
            });
        }

        function getProgress(item) {
            if (item.watch_history.length != 0) {
                return item.watch_history[item.watch_history.length - 1].progress;
            } else {
                return 0;
            }
        }

        function changeStatus(mediaId, button) {
            const item = allMedia[mediaId];
            const history = item.watch_history.at(-1);

            if (button == 'start') {
                item.status = 'CURRENT';
                item.watch_history.push({
                    progress: 0,
                    status: 'IN-PROGRESS',
                    start_date: new Date()
                });
            } else if (button == 'finish') {
                item.status = 'COMPLETED';
                history.end_date = new Date();
                history.status = 'COMPLETED';
            } else if (button == 'revive') {
                item.status = 'CURRENT';
                history.status = 'IN-PROGRESS';
                history.end_date = null;
            } else if (button == 'pause') {
                item.status = 'PAUSED';
                history.status = 'PAUSED';
                history.end_date = null;
            } else if (button == 'continue') {
                item.status = 'CURRENT';
                history.status = 'IN-PROGRESS';
            } else if (button == 'drop') {
                item.status = 'DROPPED';
                history.end_date = new Date();
                history.status = 'DROPPED';
            }
            // TODO: Update UI
        }

        async function fetchLists() {
            try {
                const response = await fetch(`${API_URL}/lists/`);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const rawLists = await response.json();
                mediaLists = {
                    CURRENT:[],
                    REPEATING:[],
                    PLANNING:[],
                    COMPLETED:[],
                    PAUSED:[],
                    DROPPED:[]
                };

                rawLists.forEach(list => {
                    if (!(list.name in mediaLists)) {
                        mediaLists[list.name] = [];
                    }
                });

                return Object.keys(mediaLists);
            } catch (error) {
                console.error("Error fetching list data:", error);
                document.getElementById('media-container').innerHTML = "<p>Error loading lists</p>";
            }
        }


        /*
         * PRIMARY FUNCTION DEFINITIONS:
         */

        function switchPage(page) {
            const libraryView = document.getElementById('library-view');
            const statsView = document.getElementById('stats-view');
            const libraryToolbar = document.getElementById('library-toolbar');

            if (page === 'stats') {
                libraryView.style.display = 'none';
                libraryToolbar.style.display = 'none';
                statsView.style.display = 'flex';
                statsView.style.flexDirection = 'column';
                statsView.style.gap = '10px';
                fetchStats();
            } else {
                libraryView.style.display = 'flex';
                libraryToolbar.style.display = 'flex';
                statsView.style.display = 'none';
            }
        }

        async function fetchMedia() {
            try {
                const response = await fetch(`${API_URL}/media/`);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const rawMedia = await response.json();
                const lists = await fetchLists();

                rawMedia.forEach(item => {
                    allMedia[item._id] = item;
                    formatItem(item);
                    
                    if (!(item.status in mediaLists)) {
                        mediaLists[item.status] = [];
                    }
                    mediaLists[item.status].push(item._id)

                    for (const list of item.lists) {
                        if (!(list in mediaLists)) {
                            alert(`${item.name} has list ${list} which wasn't found in the database.`)
                        }
                        mediaLists[list].push(item._id);
                    }
                });
                
                renderMedia();

                document.querySelector(".sticky-header h3").textContent = `${rawMedia.length} Entries`;
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('media-container').innerHTML = "<p>Error loading database. Is the server running?</p>";
            }
        }

        function renderMedia() {
            const container = document.getElementById('media-container');
            container.innerHTML = ""; 

            const listSelector = document.getElementById("list-selector");
            listSelector.innerHTML = "";
            addSingleSelectOption('All', listSelector);

            const mediaTypeSelector = document.getElementById("media-type-selector");
            mediaTypeSelector.innerHTML = "";
            addSingleSelectOption('All', mediaTypeSelector);
            
            Object.keys(mediaLists).forEach(listName => {
                let listOption = document.createElement('div');
                const isActive = (selectedList === listName) ? 'active' : '';
                
                listOption.innerHTML = `
                    <div class="single-select-item ${isActive}" onclick="selectList('${listName}')">
                        ${listName}
                    </div>
                `;
                listSelector.appendChild(listOption);
            });

            mediaFormats.forEach(format => {
                let formatOption = document.createElement('div');
                const isActive = (selectedMediaType === format) ? 'active' : '';
                
                formatOption.innerHTML = `
                    <div class="single-select-item ${isActive}" onclick="selectList('${format}')">
                        ${format}
                    </div>
                `;
                mediaTypeSelector.appendChild(formatOption);
            });

            const listsToDisplay = (selectedList === 'All') 
                ? Object.entries(mediaLists) 
                : [[selectedList, mediaLists[selectedList]]];

            listsToDisplay.forEach(([listName, ids]) => {
                if (!ids) return;

                const dropdown = document.createElement('details');
                dropdown.setAttribute('open', '');

                const summary = document.createElement('summary');
                summary.innerHTML = `
                    <span style="flex: 1;">${listName} (${ids.length})</span>
                    <button class="btn" onclick="event.stopPropagation(); addNew('${listName}')">New</button>
                `;
                dropdown.appendChild(summary);

                const grid = document.createElement('div');
                grid.className = 'grid';
                dropdown.appendChild(grid);

                // Sorting Logic
                const sorting = document.getElementById('sort-order').value;
                const sortedIds = [...ids]; // Copy to avoid mutating original list

                if (sorting === "name") {
                    sortedIds.sort((a, b) => allMedia[a].title.localeCompare(allMedia[b].title));
                } else if (sorting === "score") {
                    sortedIds.sort((a, b) => (allMedia[b].score || 0) - (allMedia[a].score || 0));
                }

                sortedIds.forEach(id => {
                    const item = allMedia[id];
                    const displayScore = item.score ? (item.score / 100).toFixed(1) : "N/A";
                    const progress = getProgress(item);
                    let percent = (item.total_units > 0) ? (progress / item.total_units) * 100 : 0;
                    if (percent > 100) percent = 100;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="title" onclick="openDetails('${item._id}')">${item.title}</div>
                        <div class="card-details">
                            <div class="status status-${item.status}">${item.formatted_status}</div>
                            <div style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
                                <div><strong>${item.media_type}</strong></div>
                                <div>${displayScore} / 10</div>
                            </div>
                            <div style="display: flex; width: 100%; align-items: center; gap: 5px;">
                                <label id="progress-${item._id}">${progress} / ${item.total_units}</label>
                                <div class="progress-container">
                                    <div class="progress-bar" id="progress-bar-${item._id}" style="width: ${percent}%"></div>
                                </div>
                            </div>
                            <button class="btn" style="width: 100%;" onclick="logWatch('${item._id}', '${item.media_type}', event)">+1 Progress</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(dropdown);
            });

            listSelector.innerHTML += newListBtnHTML;
        }

        async function logWatch(mediaId, mediaType, event) {
            event.stopPropagation();
            try {
                const response = await fetch(`${API_URL}/activity/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        media_id: mediaId,
                        media_type: mediaType,
                        action_type: "PROGRESS_UPDATE",
                        progress_added: 1
                    })
                });

                if (!response.ok) {
                    alert("Database update failed! Check server logs.");
                    return;
                }

                const freshItem = await response.json();
                allMedia[mediaId] = freshItem;

                const newProgress = getProgress(freshItem);
                const total = freshItem.total_units || '?';
                let percent = (total !== '?') ? (newProgress / total) * 100 : 0;
                if (percent > 100) percent = 100;

                document.querySelectorAll(`#progress-${mediaId}`).forEach(el => {
                    el.innerHTML = `${newProgress} / ${total}`;
                });

                document.querySelectorAll(`#progress-bar-${mediaId}`).forEach(bar => {
                    bar.style.width = `${percent}%`;
                });

            } catch (error) {
                console.error('Network Error:', error);
            }
        }

        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            btn.innerHTML = isDark ? `<strong>☀︎<\strong> Mode` : `<strong>⏾<\strong> Mode`;
        }

        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').innerHTML = `<strong>☀︎<\strong> Mode`;
            }
        })();

        function setupHistoryControlButtons(item) {
            historyBtns.forEach(btn => {
                btn.style.display = "none";
            });

            // TODO: For each button, on click, update item and history object, then call openDetails(mediaId) again to refresh
            const recentAttempt = item.watch_history.at(-1);
            if (recentAttempt == undefined) {
                startBtn.title = `Start a your first ${item.media_format} attempt!`;
                startBtn.style.display = "inline-block";
            } else if (recentAttempt.status === 'IN-PROGRESS') {
                finishBtn.title = `Finish latest ${item.media_format} attempt and set progress to 100%`;
                finishBtn.style.display = "inline-block";

                pauseBtn.title = `Pause latest ${item.media_format} attempt`;
                pauseBtn.style.display = "inline-block";

                dropBtn.title = `Drop latest ${item.media_format} attempt`;
                dropBtn.style.display = "inline-block";
            } else if (recentAttempt.status === 'PAUSED') {
                finishBtn.title = `Finish latest ${item.media_format} attempt and set progress to 100%`;
                finishBtn.style.display = "inline-block";

                continueBtn.title = `Pick up where you left off`;
                continueBtn.style.display = "inline-block";

                dropBtn.title = `Drop latest ${item.media_format} attempt`;
                dropBtn.style.display = "inline-block";
            } else if (recentAttempt.status === 'DROPPED') {
                startBtn.title = `Start a new ${item.media_format} attempt`;
                startBtn.style.display = "inline-block";

                reviveBtn.title = `Bring this ${item.media_format} attempt back from the dead (You should just start a new one)`;
                reviveBtn.style.display = "inline-block";
            } else if (recentAttempt.status === 'COMPLETED') {
                startBtn.title = `Start a new ${item.media_format} attempt`;
                startBtn.style.display = "inline-block";
            }
        }

        async function openDetails(mediaId) {
            modal.querySelector('h1').textContent = "Loading media...";

            const response = await fetch(`${API_URL}/media/${mediaId}`);
            if (!response.ok) throw new Error("Network response was not ok");
            
            var item = await response.json();
            if (mediaId != item._id) {
                alert("SOMETHING HAS GONE TERRIBLY WRONG, WE GOT THE WRONG MEDIA IN OPEN DETAILS");
            }
            allMedia[mediaId] = item;
            formatItem(item);

            editingItem = JSON.parse(JSON.stringify(item));
            currentOpenMediaId = mediaId;
            item = editingItem;

            modal.querySelector('h1').textContent = item.title;
            // document.getElementById('status-detail').value = item.status;
            document.getElementById('score-detail').value = item.score/100;
            document.getElementById('progress-detail').value = Object.values(item.watch_history).at(-1).progress;

            document.getElementById('watch-history-container').innerHTML = "";
            var count = item.watch_history.length;
            const historyTitle = item.media_format.charAt(0).toUpperCase() + item.media_format.slice(1);
            document.getElementById("history-section-title").textContent = historyTitle + " History"

            setupHistoryControlButtons(item);

            Object.values(item.watch_history).toReversed().forEach(history => {
                const historyCard = document.createElement('div');
                historyCard.className = 'history-card';
                
                let start = "Unknown";
                let end = "Unknown";
                if (history.start_date) {
                    start = formatDate(history.start_date);
                    end = history.end_date ? formatDate(history.end_date) : formatDate();
                } else if(history.status == "IN-PROGRESS") {
                    end = history.end_date ? formatDate(history.end_date) : formatDate();
                } else if (history.end_date) {
                    end = formatDate(history.end_date);
                }
                
                historyCard.innerHTML = `
                    <div style="display: flex; flex-direction: row; justify-content: space-between; border-bottom: 1px solid grey; padding-bottom: 0px;">
                        <h3 style="margin: 0px;">${historyTitle} ${count}</h3>
                        <div>${history.formatted_status}</div>
                    </div>
                    <div style="display: flex; flex-direction: row; justify-content: space-between; gap: 20px; max-width: 100%; flex: 1;">
                        <div style="flex: 0 1 auto;">
                            <input type="date" id="start-${mediaId}-${count}" onchange="history.start_date = this.value"></input>
                             - 
                            <input type="date" value="${end}" onchange="history.end_date = this.value"></input>
                        </div>
                        <div style="flex: 0 1 auto;">
                            <label for="progress-${mediaId}-${count}"><strong>Progress: </strong>
                                <input type="number" id="progress-${mediaId}-${count}"></input>
                                / ${item.total_units}
                            </label>
                        </div>
                    </div>
                    <div>
                        
                        <div id="history-notes-${mediaId}-${count}" contenteditable="true" data-placeholder="Notes..." oninput="history.watch_notes = this.textContent"></div>
                    </div>
                `;
                document.getElementById('watch-history-container').appendChild(historyCard);
                document.getElementById(`start-${mediaId}-${count}`).value = start;
                document.getElementById(`progress-${mediaId}-${count}`).value = history.progress;
                const rawNotes = history.watch_notes || "";
                const formattedNotes = rawNotes.replace(/(?:\r\n|\r|\n|\\n)/g, "<br>");
                document.getElementById(`history-notes-${mediaId}-${count}`).innerHTML = formattedNotes;
                count--;
            });

            const listContainer = document.getElementById("modal-list-container");
            listContainer.innerHTML = "";
            Object.keys(mediaLists).forEach(listName => {
                let listOption = document.createElement('div');
                const isActive = (selectedList === listName) ? 'active' : '';
                
                listOption.innerHTML = `
                    <label class="multi-select-item">${listName}
                        <input type="checkbox" checked="checked">
                        <span class="checkmark"></span>
                    </label>
                    `;
                listContainer.appendChild(listOption);
            });

            listContainer.innerHTML += newListBtnHTML;
            modal.style.display = "flex";
            document.body.classList.add("no-scroll");
        }

        async function closeDetails(save) {
            if (save) {

                const response = await fetch(`${API_URL}/media/${currentOpenMediaId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        media_id: currentOpenMediaId,
                        new_score: parseInt(editingItem.score),
                        new_status: editingItem.status,
                        watch_history: editingItem.watch_history
                    })
                });

                if (!response.ok) {
                    alert("Database update failed! Check server logs.");
                } else {
                    const freshItem = await response.json();
                    formatItem(freshItem);

                    allMedia[currentOpenMediaId] = freshItem;
                    renderMedia();
                }
            }

            modal.style.display = "none";
            document.body.classList.remove("no-scroll");
            currentOpenMediaId = null;
        }

        async function addNew(defaultStatus = 'PLANNING') {
            const title = prompt("Enter Media Title:");
            if (!title) return;

            try {
                const response = await fetch(`${API_URL}/media/?title=${encodeURIComponent(title)}&status=${defaultStatus}`, {
                    method: 'POST'
                });
                if (response.ok) {
                    const newItem = await response.json();
                    // Add to local cache and refresh UI
                    allMedia[newItem._id] = newItem;
                    formatItem(allMedia[newItem._id]);
                    fetchMedia(); // Re-fetch to handle list groupings
                }
            } catch (error) {
                console.error("Error creating media:", error);
            }
        }

        async function newList() {
            const name = prompt("Enter New List Name:");
            if (!name) return;
            const color = prompt("Enter a CSS color (e.g., #ff0000 or 'blue'):", "#777777");

            try {
                // You'll need a POST route for /lists/ if you want to save this to DB
                // For now, let's just alert that it's a future feature or 
                // implement a quick fetch if you add the route to main.py
                alert("List created! Note: You need a POST /lists/ backend route to make this permanent.");
            } catch (error) {
                console.error("Error creating list:", error);
            }
        }


        async function fetchStats() {
            const list = selectedList === 'All' ? '' : selectedList;
            const type = selectedMediaType === 'All' ? '' : selectedMediaType;
            const query = `?list_name=${encodeURIComponent(list)}&media_type=${encodeURIComponent(type)}`;

            try {
                const bins = Math.round(document.getElementById('histo-bins').value || 10);
                const speedBins = Math.round(document.getElementById('speed-histo-bins').value || 10);

                // Fail-safe fetch
                const safeFetch = async (url) => {
                    try {
                        const res = await fetch(url);
                        if (!res.ok) return []; 
                        const data = await res.json();
                        return Array.isArray(data) ? data : []; 
                    } catch (e) {
                        return []; 
                    }
                };

                const [histoData, statusDist, typeDist, listDist, historyData, completionSpeed] = await Promise.all([
                    safeFetch(`${API_URL}/stats/score-histo${query}&bins=${bins}`),
                    safeFetch(`${API_URL}/stats/status-dist?list_name=${list}`),
                    safeFetch(`${API_URL}/stats/media-type-dist?list_name=${list}`),
                    safeFetch(`${API_URL}/stats/list-dist?media_type=${type}`),
                    safeFetch(`${API_URL}/stats/watch-date${query}`),
                    safeFetch(`${API_URL}/stats/completion-speed${query}&bins=${speedBins}`)
                ]);

                // Cleanup old charts
                Object.values(charts).forEach(chart => chart.destroy());

                const commonPieOptions = {
                    ...chartOptions,
                    plugins: { legend: { display: true, position: 'bottom' } }
                };

                // Helper to draw charts OR display "No Data" text
                const renderChart = (chartKey, canvasId, data, chartConfig) => {
                    const canvas = document.getElementById(canvasId);
                    const ctx = canvas.getContext('2d');
                    if (data.length === 0) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.font = "16px sans-serif";
                        ctx.fillStyle = "#999";
                        ctx.textAlign = "center";
                        ctx.fillText("No data for this filter", canvas.width / 2, canvas.height / 2);
                    } else {
                        charts[chartKey] = new Chart(canvas, chartConfig);
                    }
                };

                renderChart('score', 'scoreHistoChart', histoData, {
                    type: 'bar',
                    data: {
                        labels: histoData.map(d => `${(d._id.min/100).toFixed(1)}-${(d._id.max/100).toFixed(1)}`),
                        datasets: [{ label: 'Shows', data: histoData.map(d => d.media_count), backgroundColor: '#007bff' }]
                    },
                    options: chartOptions
                });

                renderChart('status_dist', 'statusDistChart', statusDist, {
                    type: 'doughnut',
                    data: {
                        labels: statusDist.map(d => d._id),
                        datasets: [{
                            data: statusDist.map(d => d.media_count),
                            backgroundColor: statusDist.map(d => statusColors[d._id] || '#999')
                        }]
                    },
                    options: commonPieOptions
                });

                renderChart('typeDist', 'mediaTypeDistChart', typeDist, {
                    type: 'doughnut',
                    data: {
                        labels: typeDist.map(d => d._id),
                        datasets: [{
                            data: typeDist.map(d => d.media_count),
                            backgroundColor: ['#fd7e14', '#20c997', '#6f42c1', '#e83e8c', '#007bff']
                        }]
                    },
                    options: commonPieOptions
                });

                renderChart('listDist', 'listDistChart', listDist, {
                    type: 'doughnut',
                    data: {
                        labels: listDist.map(d => d._id),
                        datasets: [{
                            data: listDist.map(d => d.media_count),
                            backgroundColor: ['#17a2b8', '#ffc107', '#28a745', '#6c757d', '#dc3545', '#6f42c1']
                        }]
                    },
                    options: commonPieOptions
                });

                renderChart('history', 'watchHistoryChart', historyData, {
                    type: 'line',
                    data: {
                        labels: historyData.map(d => d._id),
                        datasets: [{
                            label: 'Completions',
                            data: historyData.map(d => d.count),
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: chartOptions
                });

                renderChart('speed', 'speedHistoChart', completionSpeed, {
                    type: 'bar',
                    data: {
                        labels: completionSpeed.map(d => {
                            if (d._id && typeof d._id.min === 'number') {
                                return `${Math.round(d._id.min)} - ${Math.round(d._id.max)} days`;
                            }
                            return "Unknown";
                        }),
                        datasets: [{ 
                            label: 'Shows Completed', 
                            data: completionSpeed.map(d => d.media_count), 
                            backgroundColor: '#20c997' 
                        }]
                    },
                    options: chartOptions
                });

            } catch (error) {
                console.error("Stats Rendering Error:", error);
            }
        }

        window.onload = fetchMedia;
    </script>
