<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Media Database</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: white;
            --text-color: #333;
            --header-bg: white;
            --header-border: #ddd;
            --progress-bg: #eee;
            --shadow: rgba(0,0,0,0.08);
            --summary-hover: #f0f0f0;
            --input-bg: white;
            --input-text: black;
        }

        /* 2. Define Dark Mode Overrides */
        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --header-bg: #181818;
            --header-border: #333;
            --progress-bg: #333;
            --shadow: rgba(0,0,0,0.6);
            --summary-hover: #252525;
            --input-bg: #2a2a2a;
            --input-text: white;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px); /* Lift effect on hover */
        }
        .title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .title:hover { text-decoration: underline; }
        .status { font-size: 0.9em; color: white; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 10px; background-color: #555; }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            color: var(--text-color);
            padding: 15px 20px;
            border-bottom: 2px solid var(--header-border);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px var(--shadow);
            border-radius: 6px;
        }
        .sticky-header h1 { margin: 0; font-size: 1.5em; text-shadow: 3px 3px 5px var(--shadow);}
        select {
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--header-border);
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow);
        }
        input {
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--header-border);
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow);
        }
        /* Chrome, Safari, Edge, Opera */
        /* TODO: Only remove for score input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
            field-sizing: content; /* TODO: Can't get it to fit to its content */
            min-inline-size: 5ch;
        }

        .btn {
            display: block;
            padding: 8px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--shadow);
        }
        .btn:hover {
            background: #0056b3;
            box-shadow: none;
            transform: translateY(1px);
        }
        .status-COMPLETED { background-color: #28a745; }
        .status-WATCHING, .status-CURRENT { background-color: #007bff; }
        .status-PLANNING { background-color: #6c757d; }
        .status-DROPPED { background-color: #dc3545; }
        .status-PAUSED { background-color: #ffc107; color: #333 !important; }
        .progress-container {
            background: var(--progress-bg);
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin: 15px 0;
            overflow: hidden;
            flex: 1;
            box-shadow: 0 1px 3px var(--shadow);
        }
        .progress-bar {
            background: #007bff;
            height: 100%;
            transition: width 0.3s ease;
        }
        details {
            margin-top: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        summary {
            margin-bottom: 8px;
            font-size: 1.6em;
            font-weight: bold;
            cursor: pointer;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--shadow);
            /* list-style: none; Removes the default arrow in some browsers */
        }
        summary::-webkit-details-marker { display: none; } /* Removes arrow in Safari/Chrome */
        summary:hover { background-color: var(--summary-hover); }

        .theme-toggle {
            margin-left: auto;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--header-border);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 0.8em;
            box-shadow: 0 2px 5px var(--shadow);
        }

        .no-scroll {
            overflow: hidden;
            height: 100%; /* Ensures height is locked */
        }


        .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 15% auto; /* 15% from the top and centered */
            padding: 20px;
            width: 80%; /* Could be more or less, depending on screen size */
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: left;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .details-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        .main-details-container {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            box-shadow: 0 2px 5px var(--shadow);
        }

        .small-details-container {
            display: flex;
            flex-direction: row;
            gap: 15px;
            flex: 1;
        }

        .watch-history-container {
            display: flex;
            flex-direction: column;
            gap: 7px;
            border: 1px solid black;
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            box-shadow: 0 2px 5px var(--shadow);
        }
        .history-card {
            border: 1px solid black;
            border-radius: 8px;
            padding: 7px;
        }

        .lists-section-container {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 8px;
            padding: 3px;
            flex: 1;
            box-shadow: 0 2px 5px var(--shadow);
        }

        .lists-details-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid black;
            border-radius: 8px;
            padding: 3px;
            flex: 0.6;
            box-shadow: 0 2px 5px var(--shadow);
        }

        .notes-container {
            border: 1px solid black;
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            box-shadow: inset 0 2px 5px var(--shadow);
            white-space: pre-wrap;
        }

        .detail-container {
            display: flex;
            flex-direction: column;
            padding: 10px;
            width: fit-content;
        }
    </style>
</head>
<body>

    <!-- <h1>My Media Library</h1> --> <!-- I did kinda like having this be separate from the bar, but having be on the bar makes sense for now until the bar maybe fills up more. Or maybe have it be above the bar when we're scrolled to the top of the page, but fall down into the bar when you scroll down?-->
    <div class="sticky-header">
        <h1>Media Library</h1>
        <h3></h3>
        <label for="sort-order" style="padding-left: 10px;">Sort By:</label>
        <select id="sort-order" onchange="renderMedia()">
            <option value="name">Name</option>
            <option value="score">Score</option>
            <option value="watch_date">Recently Watched</option>
            <option value="repeats">Repeats</option>
        </select>
        <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-btn">🌙 Mode</button>
    </div>
    <div id="media-container" class="block">
        <p>Loading media...</p>
    </div>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <h1 style="margin-bottom: 0; text-shadow: 3px 3px 5px var(--shadow);"></h1>
            <hr style="width:100%; margin-bottom: 50;"> <!-- Margin isn't doing anything -->
            <div class="details-container">
                <div class="main-details-container">
                    <div class="small-details-container">
                        <div class="detail-container">
                            <label for="status-detail"><strong>Status</strong></label>
                            <select id="status-detail">
                                <option value="PLANNING">PLANNING</option>
                                <option value="CURRENT">CURRENT</option>
                                <option value="REPEATING">REPEATING</option>
                                <option value="PAUSED">PAUSED</option>
                                <option value="DROPPED">DROPPED</option>
                            </select>
                        </div>
                        <div class="detail-container">
                            <label for="score-detail"><strong>Score</strong></label>
                            <input type="number" id="score-detail"></input>
                        </div>
                    </div>

                    <h3 style="padding-left: 5px; margin-bottom: 1px;">Notes</h3>
                    <!-- The notes text isn't formatted :( -->
                    <div class="notes-container" id="notes-container" contenteditable="true"></div>

                    <h2 style="padding-left: 3px; margin-bottom: 1;">Watch History</h2>
                    <div class="watch-history-container", id="watch-history-container">
                        <!-- TODO: Show each watch history element from newest to oldest.
                        If there are none, have a button to make one. Doing this should change the status to watching. -->
                    </div>
                </div>

                <div class="lists-section-container">
                    <h3 style="margin-top: 1; margin-left: 1;">Lists</h3> <!-- If I set margin-top to 0, it's too close, but if it's anything else it's a huge gap. Changing margin-left doesn't seem to do anything. Also h2 is too big but h3 is too small. -->
                    <div class="lists-details-container">
                        <!-- TODO: Show lists with check boxes, probably in order that they were created? -->
                    </div style="margin-bottom: 0;">
                </div>
            </div>
            <span class="btn" onclick="closeDetails()" style="align-self: right; text-align: center; width: fit-content;"><strong>Save</strong></span> <!-- TODO: Should be bottom right -->
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let mediaLists = {};
        const modal = document.getElementById("details-modal");

        window.onclick = function(event) {
            // TODO: Hitting esc while the modal is open should also close it
            if (event.target == modal) {
                modal.style.display = "none";
            }
        } 

        function closeDetails() {
            modal.style.display = "none";
            document.body.classList.remove("no-scroll");
        }

        async function fetchMedia() {
            try {
                // Call the GET route
                const response = await fetch(`${API_URL}/media/`);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const rawMedia = await response.json();
                mediaLists = {
                    CURRENT:[],
                    REPEATING:[],
                    PLANNING:[],
                    COMPLETED:[],
                    PAUSED:[],
                    DROPPED:[]
                };

                rawMedia.forEach(item => {
                    if (!(item.status in mediaLists)) {
                        mediaLists[item.status] = [];
                    }
                    mediaLists[item.status].push(item)

                    for (const list of item.lists) {
                        if (!(list in mediaLists)) {
                            mediaLists[list] = [];
                        }
                        mediaLists[list].push(item);
                    }
                });
                
                renderMedia();

                document.querySelector(".sticky-header h3").textContent = `Total Entries: ${rawMedia.length}`;
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('media-container').innerHTML = "<p>Error loading database. Is the server running?</p>";
            }
        }

        function getProgress(item) {
            if (item.watch_history.length != 0) {
                return item.watch_history[item.watch_history.length - 1].progress;
            } else {
                // alert(`${item.title} has no watch history. Is that ok?`);
                return 0;
            }
        }

        function renderMedia() {
            const container = document.getElementById('media-container');
            container.innerHTML = ""; // Clear the loading text
            
            Object.entries(mediaLists).forEach(([listName, items]) => {
                const dropdown = document.createElement('details');
                dropdown.setAttribute('open', '');

                const summary = document.createElement('summary');
                summary.textContent = `${listName} (${items.length})`; // TODO: Make the number of elements be on the far right side?
                dropdown.appendChild(summary);

                const grid = document.createElement('div');
                grid.className = 'grid';
                dropdown.appendChild(grid);

                const sorting = document.getElementById('sort-order').value;

                switch (sorting) {
                    case "name": {items.sort((a, b) => a.title.localeCompare(b.title)); break;}
                    case "score": {items.sort((a, b) => (b.score || 0) - (a.score || 0)); break;}
                    case "repeats": {items.sort((a, b) => (b.repeats || 0) - (a.repeats || 0)); break;}
                    case "watch_date": {
                        items.sort((a, b) => {
                            // Get the latest date from the history, or a very old date if empty
                            const dateA = a.watch_history.length > 0 
                                ? new Date(a.watch_history[a.watch_history.length - 1].start_date) 
                                : new Date(0);
                            const dateB = b.watch_history.length > 0 
                                ? new Date(b.watch_history[b.watch_history.length - 1].start_date) 
                                : new Date(0);
                            return dateB - dateA; // Descending (Newest first)
                        });
                        break;
                    }
                }


                items.forEach(item => {
                    // Calculate display score
                    const displayScore = item.score ? (item.score / 100).toFixed(1) : "N/A";
                    var progress = getProgress(item);

                    let percent = 0;
                    if (item.total_units && item.total_units > 0) {
                        percent = (progress / item.total_units) * 100;
                    }
                    if (percent > 100) percent = 100;

                    var itemStatus = item.status;
                    if (item.media_type  == "Anime" || item.media_type  == "Anime Movie"
                        || item.media_type  == "Anime AMV" || item.media_type  == "Live-Action Movie"
                        || item.media_type  == "Live-Action Show") {
                        switch (item.status) {
                            case "CURRENT": { itemStatus = "WATCHING"; break; }
                            case "REPEATING": { itemStatus = "RE-WATCHING"; break; }
                        }
                    } else if (item.media_type  == "Manga" || item.media_type  == "Light Novel"
                        || item.media_type  == "Webtoon" || item.media_type  == "Book") {
                        switch (item.status) {
                            case "CURRENT": { itemStatus = "READING"; break; }
                            case "REPEATING": { itemStatus = "RE-READING"; break; }
                        }
                    }

                    // Create the card HTML
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="title" onclick="openDetails('${item._id}')">${item.title}</div>
                        <div class="status status-${item.status}">${itemStatus}</div>
                        <div style="display: flex;  width: 100%; margin-bottom: 5px; margin-top: 0px;">
                            <div style="flex: 1;"><strong>${item.media_type}<strong></div>
                            <div">${displayScore} / 10</div>
                        </div>
                        <div style="display: flex; width: 100%; margin-top: 5px; margin-bottom: -5px;">
                            <label for="progress-container-${item._id}" id="progress-${item._id}">${progress} / ${item.total_units}</label> <!-- The text isn't aligned with the bar :( -->
                            <div class="progress-container" id="progress-container-${item._id}">
                                <div class="progress-bar" style="width: ${percent}%" id="progress-bar-${item._id}"></div>
                            </div>
                        </div>
                        <button class="btn" style="width: 100%;" onclick="logWatch('${item._id}', '${item.media_type}', event)">+1 Progress</button>
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(dropdown);
            });
        }

        async function logWatch(mediaId, mediaType, event) {
            event.stopPropagation();
            try {
                const response = await fetch(`${API_URL}/activity/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        media_id: mediaId,
                        media_type: mediaType,
                        action_type: "PROGRESS_UPDATE",
                        progress_added: 1
                    })
                });

                if (!response.ok) {
                    alert("Database update failed! Check server logs.");
                    return;
                }

                const freshItem = await response.json();

                Object.keys(mediaLists).forEach(list => {
                    const index = mediaLists[list].findIndex(i => i._id === mediaId);
                    if (index !== -1) mediaLists[list][index] = freshItem;
                });

                const newProgress = getProgress(freshItem);
                const total = freshItem.total_units || '?';
                let percent = (total !== '?') ? (newProgress / total) * 100 : 0;
                if (percent > 100) percent = 100;

                document.querySelectorAll(`#progress-${mediaId}`).forEach(el => {
                    el.innerHTML = `${newProgress} / ${total}`;
                });

                document.querySelectorAll(`#progress-bar-${mediaId}`).forEach(bar => {
                    bar.style.width = `${percent}%`;
                });

            } catch (error) {
                console.error('Network Error:', error);
            }
        }

        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            btn.textContent = isDark ? '☀️ Mode' : '🌙 Mode';
        }

        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').textContent = '☀️ Mode';
            }
        })();

        async function openDetails(mediaId) {
            modal.style.display = "block";
            document.body.classList.add("no-scroll");

            modal.querySelector('h1').textContent = "Loading media...";

            const response = await fetch(`${API_URL}/media/${mediaId}`);
            if (!response.ok) throw new Error("Network response was not ok");
            
            const item = await response.json();
            Object.values(mediaLists).forEach(list => {
                if (list.some(item => item._id == mediaId)) {
                    index = list.findIndex(item => item._id == mediaId);
                    list[index] = item;
                }
            });
            // TODO: Need to actually update the rendering.
            // TODO: Rather than having a bunch of copies of the same object, it probably makes more sense to have one dict that's just all of the shows by their ids, and then another dict that's arrays of ids by their categories. That way I could just update it in one spot, and then call for a UI update of one ID.

            modal.querySelector('h1').textContent = `${item.title}`;
            document.getElementById('status-detail').value = `${item.status}`;
            document.getElementById('score-detail').value = item.score/100;
            document.getElementById('notes-container').textContent = `${item.watch_history.at(-1).watch_notes}`;

            document.getElementById('watch-history-container').innerHTML = "";
            var count = item.watch_history.length;
            Object.values(item.watch_history).toReversed().forEach(history => {
                const historyCard = document.createElement('div');
                historyCard.className = 'history-card';
                const end = history.end_date ? history.end_date : "Now";
                // TODO: Format dates
                historyCard.innerHTML = `
                    <div style="display: flex; flex-direction: row; flex: 1;">
                        <div class="title" style="flex: 1;">Watch ${count}</div>
                        <div>${history.status}</div>
                    </div>
                    <div style="display: flex; flex-direction: row; flex: 1;">
                        <div style="flex: 1;">${history.start_date} - ${end}</div>
                        <label for="progress-${mediaId}-${count}"><strong>Progress: </strong></label>
                        <input type="number" id="progress-${mediaId}-${count}"></input>
                    </div>
                    <label for="history-notes-${mediaId}-${count}"><strong>Notes: </strong></label>
                    <div class="notes-container" id="history-notes-${mediaId}-${count}"></div>
                `;
                document.getElementById('watch-history-container').appendChild(historyCard);
                document.getElementById(`progress-${mediaId}-${count}`).value = history.progress;
                document.getElementById(`history-notes-${mediaId}-${count}`).textContent = history.watch_notes;
                document.getElementById('watch-history-container').appendChild(historyCard);
                count--;
            });

            // TODO: Populate lists
        }


        // Run the fetch when the page loads
        window.onload = fetchMedia;
    </script>

</body>
</html>
