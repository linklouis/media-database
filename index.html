<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Media Database</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: white;
            --text-color: #333;
            --header-bg: white;
            --header-border: #ddd;
            --progress-bg: #eee;
            --shadow: rgba(0,0,0,0.08);
            --summary-hover: #f0f0f0;
            --input-bg: white;
            --input-text: black;
        }

        /* 2. Define Dark Mode Overrides */
        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --header-bg: #181818;
            --header-border: #333;
            --progress-bg: #333;
            --shadow: rgba(0,0,0,0.4);
            --summary-hover: #252525;
            --input-bg: #2a2a2a;
            --input-text: white;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px); /* Lift effect on hover */
        }
        .title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .status { font-size: 0.9em; color: white; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 10px; background-color: #555; }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            color: var(--text-color);
            padding: 15px 20px;
            border-bottom: 2px solid var(--header-border);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 10px var(--shadow);
        }
        .sticky-header h1 { margin: 0; font-size: 1.5em; }
        select {
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--header-border);
        }
        .btn { display: block; width: 100%; padding: 8px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .status-COMPLETED { background-color: #28a745; }
        .status-WATCHING, .status-CURRENT { background-color: #007bff; }
        .status-PLANNING { background-color: #6c757d; }
        .status-DROPPED { background-color: #dc3545; }
        .status-PAUSED { background-color: #ffc107; color: #333 !important; }
        .progress-container {
            background: var(--progress-bg);
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin: 15px 0;
            overflow: hidden;
            flex: 1;
        }
        .progress-bar {
            background: #007bff;
            height: 100%;
            transition: width 0.3s ease;
        }
        details {
            margin-bottom: 25px;
            width: 100%;
        }
        summary { /* The cards are touching the dropdown bar */
            font-size: 1.6em;
            font-weight: bold;
            cursor: pointer;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--shadow);
            /* list-style: none; Removes the default arrow in some browsers */
        }
        summary::-webkit-details-marker { display: none; } /* Removes arrow in Safari/Chrome */
        summary:hover { background-color: var(--summary-hover); }

        .theme-toggle {
            margin-left: auto;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--header-border);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <!-- <h1>My Media Library</h1> --> <!-- I did kinda like having this be separate from the bar, but having be on the bar makes sense for now until the bar maybe fills up more. Or maybe have it be above the bar when we're scrolled to the top of the page, but fall down into the bar when you scroll down?-->
    <div class="sticky-header">
        <h1>Media Library</h1>
        <h3></h3>
        <label for="sort-order" style="padding-left: 10px;">Sort By:</label>
        <select id="sort-order" onchange="renderMedia()">
            <option value="name">Name</option>
            <option value="score">Score</option>
            <option value="watch_date">Recently Watched</option>
            <option value="repeats">Repeats</option>
        </select>
        <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-btn">🌙 Mode</button>
    </div>
    <div id="media-container" class="block">
        <p>Loading media...</p>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let mediaLists = {}
        async function fetchMedia() {
            try {
                // Call the GET route
                const response = await fetch(`${API_URL}/media/`);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const rawMedia = await response.json();
                mediaLists = {
                    CURRENT:[],
                    REPEATING:[],
                    PLANNING:[],
                    COMPLETED:[],
                    PAUSED:[],
                    DROPPED:[]
                };

                rawMedia.forEach(item => {
                    if (!(item.status in mediaLists)) {
                        mediaLists[item.status] = [];
                    }
                    mediaLists[item.status].push(item)

                    for (const list of item.lists) {
                        if (!(list in mediaLists)) {
                            mediaLists[list] = [];
                        }
                        mediaLists[list].push(item);
                    }
                });
                
                renderMedia();

                document.querySelector(".sticky-header h3").textContent = `Total Entries: ${rawMedia.length}`;
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('media-container').innerHTML = "<p>Error loading database. Is the server running?</p>";
            }
        }

        function getProgress(item) {
            if (item.watch_history.length != 0) {
                return item.watch_history[item.watch_history.length - 1].progress;
            } else {
                // alert(`${item.title} has no watch history. Is that ok?`);
                return 0;
            }
        }

        function renderMedia() {
            const container = document.getElementById('media-container');
            container.innerHTML = ""; // Clear the loading text
            
            Object.entries(mediaLists).forEach(([listName, items]) => {
                const dropdown = document.createElement('details');
                dropdown.setAttribute('open', '');

                const summary = document.createElement('summary');
                summary.textContent = `${listName} (${items.length})`;
                dropdown.appendChild(summary);

                const grid = document.createElement('div');
                grid.className = 'grid';
                dropdown.appendChild(grid);

                const sorting = document.getElementById('sort-order').value;

                switch (sorting) {
                    case "name": {items.sort((a, b) => a.title.localeCompare(b.title)); break;}
                    case "score": {items.sort((a, b) => (b.score || 0) - (a.score || 0)); break;}
                    case "repeats": {items.sort((a, b) => (b.repeats || 0) - (a.repeats || 0)); break;}
                    case "watch_date": {
                        items.sort((a, b) => {
                            // Get the latest date from the history, or a very old date if empty
                            const dateA = a.watch_history.length > 0 
                                ? new Date(a.watch_history[a.watch_history.length - 1].start_date) 
                                : new Date(0);
                            const dateB = b.watch_history.length > 0 
                                ? new Date(b.watch_history[b.watch_history.length - 1].start_date) 
                                : new Date(0);
                            return dateB - dateA; // Descending (Newest first)
                        });
                        break;
                    }
                }


                items.forEach(item => {
                    // Calculate display score
                    const displayScore = item.score ? (item.score / 100).toFixed(1) : "N/A";
                    var progress = getProgress(item);

                    let percent = 0;
                    if (item.total_units && item.total_units > 0) {
                        percent = (progress / item.total_units) * 100;
                    }
                    if (percent > 100) percent = 100;

                    var itemStatus = item.status;
                    if (item.media_type  == "Anime" || item.media_type  == "Anime Movie"
                        || item.media_type  == "Anime AMV" || item.media_type  == "Live-Action Movie"
                        || item.media_type  == "Live-Action Show") {
                        switch (item.status) {
                            case "CURRENT": { itemStatus = "WATCHING"; break; }
                            case "REPEATING": { itemStatus = "RE-WATCHING"; break; }
                        }
                    } else if (item.media_type  == "Manga" || item.media_type  == "Light Novel"
                        || item.media_type  == "Webtoon" || item.media_type  == "Book") {
                        switch (item.status) {
                            case "CURRENT": { itemStatus = "READING"; break; }
                            case "REPEATING": { itemStatus = "RE-READING"; break; }
                        }
                    }

                    // Create the card HTML
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="title">${item.title}</div>
                        <div class="status status-${item.status}">${itemStatus}</div>
                        <div style="display: flex;  width: 100%;">
                            <div style="flex: 1;">${item.media_type}</div>
                            <div">${displayScore} / 10</div>
                        </div>
                        <div style="display: flex; width: 100%;">
                            <label for="progress-container-${item._id}" id="progress-${item._id}">${progress} / ${item.total_units}</label> <!-- The text isn't aligned with the bar :( -->
                            <div class="progress-container" id="progress-container-${item._id}">
                                <div class="progress-bar" style="width: ${percent}%" id="progress-bar-${item._id}"></div>
                            </div>
                        </div>
                        <button class="btn" onclick="logWatch('${item._id}', '${item.media_type}')">+1 Progress</button>
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(dropdown);
            });
        }

        async function logWatch(mediaId, mediaType) {
            try {
                const response = await fetch(`${API_URL}/activity/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        media_id: mediaId,
                        media_type: mediaType,
                        action_type: "PROGRESS_UPDATE",
                        progress_added: 1
                    })
                });

                if (!response.ok) {
                    alert("Database update failed! Check server logs.");
                    return;
                }

                const freshItem = await response.json();

                Object.keys(mediaLists).forEach(list => {
                    const index = mediaLists[list].findIndex(i => i._id === mediaId);
                    if (index !== -1) mediaLists[list][index] = freshItem;
                });

                const newProgress = getProgress(freshItem);
                const total = freshItem.total_units || '?';
                let percent = (total !== '?') ? (newProgress / total) * 100 : 0;
                if (percent > 100) percent = 100;

                document.querySelectorAll(`#progress-${mediaId}`).forEach(el => {
                    el.innerHTML = `${newProgress} / ${total}`;
                });

                document.querySelectorAll(`#progress-bar-${mediaId}`).forEach(bar => {
                    bar.style.width = `${percent}%`;
                });

            } catch (error) {
                console.error('Network Error:', error);
            }
        }

        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            btn.textContent = isDark ? '☀️ Mode' : '🌙 Mode';
        }

        function openDetails(mediaId) {

        }

        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').textContent = '☀️ Mode';
            }
        })();


        // Run the fetch when the page loads
        window.onload = fetchMedia;
    </script>

</body>
</html>
